<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>All Yours · Beauty Advisor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F2ED;--surface:#FFFFFF;--surface2:#FAF8F5;--border:#E8E2D9;
  --text:#1C1814;--text2:#6B5F52;--text3:#A8998A;
  --accent:#A8543A;--accent2:#748A60;--accent-avoid:#8B2020;
  --r:20px;--r-sm:12px;
  --sh:0 2px 12px rgba(28,24,20,.07);--sh-lg:0 8px 32px rgba(28,24,20,.12);
}
html,body{height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.hd{padding:20px 20px 0;flex-shrink:0}
.hd-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.hd-eye{font-size:10px;text-transform:uppercase;letter-spacing:.18em;font-weight:600;color:var(--accent);margin-bottom:4px}
.hd-title{font-family:'Fraunces',serif;font-size:26px;font-weight:400;line-height:1.15}
.lang-pill{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:999px;overflow:hidden;flex-shrink:0;margin-top:4px}
.lang-btn{padding:6px 12px;font-size:11px;font-weight:600;color:var(--text3);border:none;background:none;cursor:pointer;transition:all .15s}
.lang-btn.active{background:var(--text);color:#fff;border-radius:999px}

/* TABS */
.tabs{display:flex;padding:16px 20px 0;flex-shrink:0;gap:2px}
.tab{flex:1;text-align:center;padding:11px 2px;font-size:12px;font-weight:500;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;background:var(--accent);color:#fff;border-radius:999px;font-size:9px;font-weight:700;padding:0 4px;margin-left:4px;vertical-align:middle}

/* FILTER BAR */
.fbar{padding:12px 20px 0;flex-shrink:0;display:flex;gap:8px}
.search{flex:1;display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:10px 14px;gap:8px;box-shadow:var(--sh)}
.search input{border:none;outline:none;background:none;font-size:13px;width:100%;color:var(--text);font-family:'Inter',sans-serif}
.search input::placeholder{color:var(--text3)}
.fbtn{display:flex;align-items:center;gap:6px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:999px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;box-shadow:var(--sh);transition:all .15s;white-space:nowrap;flex-shrink:0}
.fbtn.has-filters{background:var(--text);color:#fff;border-color:var(--text)}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;padding:12px 20px 100px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.count{font-size:12px;color:var(--text3);margin-bottom:16px;padding-top:2px}

/* CARD */
.card{background:var(--surface);border-radius:var(--r);margin-bottom:16px;overflow:hidden;box-shadow:var(--sh)}
.card-img-wrap{position:relative;cursor:pointer}
.card-img{width:100%;aspect-ratio:16/8;object-fit:cover;display:block}
.card-img-ph{width:100%;aspect-ratio:16/8;background:#F1EDE4;display:flex;align-items:center;justify-content:center}
.card-price-badge{position:absolute;bottom:12px;left:12px;background:rgba(255,255,255,.94);border-radius:999px;padding:5px 12px;font-family:'Fraunces',serif;font-size:16px;color:var(--text)}
.card-body{padding:16px 16px 0;cursor:pointer}
.card-eye{font-size:10px;text-transform:uppercase;letter-spacing:.18em;font-weight:600;color:var(--accent);margin-bottom:3px}
.card-name{font-family:'Fraunces',serif;font-size:20px;font-weight:400;line-height:1.2;color:var(--text);margin-bottom:10px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag{padding:5px 11px;border-radius:999px;font-size:12px;font-weight:500}
.tag-fam{background:#EFE9E0;color:var(--text2)}
.tag-color{color:#fff}
.family-text{font-size:12px;color:var(--text3);margin-bottom:10px;line-height:1.4}
.family-text span{font-weight:500;color:var(--text2)}
.pyr{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.pyr-row{display:flex;gap:10px;align-items:flex-start}
.pyr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.pyr-pos{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.pyr-notes{font-size:13px;color:var(--text);line-height:1.4}
.inspo{padding:12px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--text3);font-style:italic;line-height:1.5}
.inspo b{font-style:normal;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)}
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:10px}
.btn-select{flex:1;padding:9px 12px;border-radius:999px;border:1.5px solid var(--border);background:none;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-select.sel{background:var(--text);color:#fff;border-color:var(--text)}
.btn-like{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.btn-like.liked{background:var(--accent);border-color:var(--accent)}

/* EMPTY */
.empty{text-align:center;padding:64px 20px}
.empty-icon{margin-bottom:16px;opacity:.25}
.empty h3{font-family:'Fraunces',serif;font-size:20px;font-weight:400;margin-bottom:8px;color:var(--text)}
.empty p{font-size:14px;color:var(--text3);line-height:1.6}

/* SHEET */
.overlay{position:fixed;inset:0;background:rgba(28,24,20,.45);z-index:100;display:none;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:90vh;display:flex;flex-direction:column}
.sheet-bar{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px}
.sheet-title{font-family:'Fraunces',serif;font-size:20px;font-weight:400}
.sheet-close{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.sheet-body{overflow-y:auto;padding:4px 20px 8px;-webkit-overflow-scrolling:touch}
.sheet-body::-webkit-scrollbar{display:none}
.sheet-sect{margin-bottom:24px}
.sheet-sect-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
/* include/avoid tabs inside sheet */
.ia-tabs{display:flex;gap:0;border:1.5px solid var(--border);border-radius:999px;overflow:hidden;margin-bottom:12px;width:fit-content}
.ia-tab{padding:6px 16px;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--text3);transition:all .15s}
.ia-tab.active-inc{background:var(--accent2);color:#fff}
.ia-tab.active-avoid{background:var(--accent-avoid);color:#fff}
/* note list */
.note-list{max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r-sm);-webkit-overflow-scrolling:touch}
.note-list::-webkit-scrollbar{width:4px}
.note-list::-webkit-scrollbar-track{background:transparent}
.note-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.note-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.note-item:last-child{border-bottom:none}
.note-item:active{background:var(--surface2)}
.note-item-label{font-size:14px;color:var(--text)}
.note-item-state{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .15s}
.note-item-state.inc{background:var(--accent2);border-color:var(--accent2);color:#fff}
.note-item-state.avoid{background:var(--accent-avoid);border-color:var(--accent-avoid);color:#fff}
/* family chips */
.fam-chips{display:flex;flex-wrap:wrap;gap:6px}
.fam-chip{padding:8px 13px;border-radius:999px;border:1.5px solid var(--border);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;background:none}
.fam-chip.inc{border-color:var(--accent2);background:var(--accent2);color:#fff}
.fam-chip.avoid{border-color:var(--accent-avoid);background:var(--accent-avoid);color:#fff}
/* price + season */
.option-row{display:flex;flex-wrap:wrap;gap:6px}
.option-btn{padding:8px 13px;border-radius:999px;border:1.5px solid var(--border);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;background:none}
.option-btn.active{border-color:var(--text);background:var(--text);color:#fff}
.sheet-footer{padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0}
.sheet-count{font-size:12px;color:var(--text3);margin-bottom:10px}
.btn-primary{width:100%;padding:15px;background:var(--text);color:#fff;border:none;border-radius:999px;font-family:'Fraunces',serif;font-size:18px;font-weight:400;cursor:pointer}
/* active filters summary */
.active-filters{display:flex;flex-wrap:wrap;gap:6px;padding:10px 20px 0;flex-shrink:0}
.af-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:500;cursor:pointer}
.af-inc{background:#EAF0E4;color:#4A6B38}
.af-avoid{background:#F5E5E5;color:#8B2020}

/* DETAIL */
.detail{position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto;display:none}
.detail.open{display:block}
.detail-back{position:sticky;top:0;background:rgba(245,242,237,.9);backdrop-filter:blur(8px);padding:12px 20px;display:flex;align-items:center;gap:10px;z-index:10;border-bottom:1px solid var(--border)}
.detail-back button{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2)}
.detail-body{padding:0 20px 48px}
.detail-img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:var(--r);margin-bottom:20px;background:var(--surface2);display:block}
.detail-img-ph{width:100%;aspect-ratio:4/3;background:var(--surface2);border-radius:var(--r);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.detail-eye{font-size:11px;text-transform:uppercase;letter-spacing:.18em;font-weight:600;color:var(--accent);margin-bottom:4px}
.detail-name{font-family:'Fraunces',serif;font-size:28px;font-weight:400;margin-bottom:4px}
.detail-price{font-family:'Fraunces',serif;font-size:22px;margin-bottom:14px}
.detail-actions{display:flex;gap:8px;margin-bottom:24px}
.detail-select{flex:1;padding:11px;border-radius:999px;border:1.5px solid var(--border);background:none;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.detail-select.sel{background:var(--text);color:#fff;border-color:var(--text)}
.detail-like{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--border);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.detail-like.liked{background:var(--accent);border-color:var(--accent)}
.detail-sect{margin-bottom:20px}
.detail-sect-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.15em;color:var(--text3);margin-bottom:10px}
.detail-pyr{display:flex;flex-direction:column;gap:12px}
.detail-pyr-row{display:flex;gap:12px}
.detail-pyr-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.detail-pyr-pos{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.detail-pyr-notes{font-size:14px;line-height:1.4}
.detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.meta-item{background:var(--surface2);border-radius:var(--r-sm);padding:12px}
.meta-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:4px}
.meta-value{font-size:14px;font-weight:500}
.detail-inspo{background:var(--surface2);border-radius:var(--r-sm);padding:16px;font-size:14px;font-style:italic;color:var(--text2);line-height:1.6}
.sim-card{display:flex;gap:12px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.sim-card:active{background:var(--surface2)}
.sim-img{width:52px;height:52px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--surface2)}
.sim-img-ph{width:52px;height:52px;border-radius:10px;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center}
.sim-info{flex:1;min-width:0}
.sim-brand{font-size:10px;text-transform:uppercase;letter-spacing:.12em;font-weight:600;color:var(--accent)}
.sim-name{font-size:15px;font-family:'Fraunces',serif;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sim-fam{font-size:12px;color:var(--text3)}
.sim-price{font-family:'Fraunces',serif;font-size:15px;flex-shrink:0;color:var(--text)}
</style>

<script>
const P = window.PERFUMES_DATA || [];
const N = window.NOTE_NAMES || {};

let lang = 'es';
let tab = 'catalog';
let selectedIds = new Set();
let likedIds = new Set();
// Filters: include families/notes (must have), avoid families/notes (must not have)
let filters = {
  inc_fam: [], avoid_fam: [],
  inc_notes: [], avoid_notes: [],
  inc_chars: [], avoid_chars: [],
  estacao: 'any', marcas: [], precoMax: Infinity,

};

// ── i18n ──────────────────────────────────────────────────────────────────────
const UI_TEXT = {
  es: { appTitle:'Asistente de indicación', catalog:'Catálogo', selection:'Selección', liked:'Le gustó', similar:'Similares', search:'Buscar...', filter:'Filtrar', apply:'Ver resultados', family:'Familia olfativa', notes:'Notas', season:'Estación', brand:'Marca', price:'Precio', any:'Cualquiera', upTo:'Hasta', show:'Mostrar al cliente', showing:'Mostrando', likeIt:'Le gustó', markLike:'Marcar', topNotes:'Notas de salida', heartNotes:'Notas de corazón', baseNotes:'Notas de fondo', inspiration:'Inspiración', concentration:'Concentración', duration:'Duración', projection:'Proyección', olfFamily:'Familia olfativa', similars:'Perfumes similares', noRes:'Sin resultados', noResSub:'Prueba con otros filtros.', emptySel:'Sin selección', emptySelSub:'Ve al catálogo y toca "Mostrar al cliente".', emptyLiked:'Sin favoritos', emptyLikedSub:'Marca los que le gustan al cliente.', emptySim:'Sin favoritos', emptySimSub:'Primero marca perfumes que le gustaron al cliente.', back:'Volver', allBrands:'Todas', include:'Incluir', avoid:'Evitar', includeDesc:'El perfume debe tener esta nota/familia', avoidDesc:'Excluir perfumes con esta nota/familia', activeInc:'Incluye:', activeAvoid:'Evita:', clear:'✕', allSeasons:'Todas' },
  en: { appTitle:'Recommendation Assistant', catalog:'Catalog', selection:'Selection', liked:'Liked', similar:'Similar', search:'Search...', filter:'Filter', apply:'See results', family:'Olfactory family', notes:'Notes', season:'Season', brand:'Brand', price:'Price', any:'Any', upTo:'Up to', show:'Show to client', showing:'Showing', likeIt:'Liked it', markLike:'Mark', topNotes:'Top notes', heartNotes:'Heart notes', baseNotes:'Base notes', inspiration:'Inspiration', concentration:'Concentration', duration:'Duration', projection:'Projection', olfFamily:'Olfactory family', similars:'Similar perfumes', noRes:'No results', noResSub:'Try other filters.', emptySel:'No selection', emptySelSub:'Go to catalog and tap "Show to client".', emptyLiked:'No favorites', emptyLikedSub:'Mark the ones the client likes.', emptySim:'No favorites', emptySimSub:'First mark perfumes the client liked.', back:'Back', allBrands:'All', include:'Include', avoid:'Avoid', includeDesc:'Perfume must have this note/family', avoidDesc:'Exclude perfumes with this note/family', activeInc:'Includes:', activeAvoid:'Avoids:', clear:'✕', allSeasons:'All' },
  pt: { appTitle:'Assistente de indicação', catalog:'Catálogo', selection:'Seleção', liked:'Gostou', similar:'Similares', search:'Buscar...', filter:'Filtrar', apply:'Ver resultados', family:'Família olfativa', notes:'Notas', season:'Estação', brand:'Marca', price:'Preço', any:'Qualquer', upTo:'Até', show:'Mostrar ao cliente', showing:'Mostrando', likeIt:'Gostou', markLike:'Marcar', topNotes:'Notas de saída', heartNotes:'Notas de coração', baseNotes:'Notas de fundo', inspiration:'Inspiração', concentration:'Concentração', duration:'Duração', projection:'Projeção', olfFamily:'Família olfativa', similars:'Perfumes similares', noRes:'Sem resultados', noResSub:'Tente outros filtros.', emptySel:'Sem seleção', emptySelSub:'Vá ao catálogo e toque "Mostrar ao cliente".', emptyLiked:'Sem favoritos', emptyLikedSub:'Marque os que o cliente gostou.', emptySim:'Sem favoritos', emptySimSub:'Primeiro marque perfumes que o cliente gostou.', back:'Voltar', allBrands:'Todas', include:'Incluir', avoid:'Evitar', includeDesc:'O perfume deve ter esta nota/família', avoidDesc:'Excluir perfumes com esta nota/família', activeInc:'Inclui:', activeAvoid:'Evita:', clear:'✕', allSeasons:'Todas' }
};
const FAM_NAMES = {
  es:{ oriental:'Oriental', woody:'Amaderado', floral:'Floral', gourmand:'Gourmand', spicy:'Especiado', citrus:'Cítrico', fresh:'Fresco', musky:'Almizclado', fruity:'Frutal', green:'Verde', aromatic:'Aromático', leather:'Cuero', aquatic:'Acuático', amber:'Ámbar', powdery:'Atalcado', chypre:'Chipre', fougere:'Fougère' },
  en:{ oriental:'Oriental', woody:'Woody', floral:'Floral', gourmand:'Gourmand', spicy:'Spicy', citrus:'Citrus', fresh:'Fresh', musky:'Musky', fruity:'Fruity', green:'Green', aromatic:'Aromatic', leather:'Leather', aquatic:'Aquatic', amber:'Amber', powdery:'Powdery', chypre:'Chypre', fougere:'Fougère' },
  pt:{ oriental:'Oriental', woody:'Amadeirado', floral:'Floral', gourmand:'Gourmand', spicy:'Especiado', citrus:'Cítrico', fresh:'Fresco', musky:'Almiscarado', fruity:'Frutado', green:'Verde', aromatic:'Aromático', leather:'Couro', aquatic:'Aquático', amber:'Âmbar', powdery:'Empoado', chypre:'Chipre', fougere:'Fougère' },
};
const SEASON_NAMES = {
  es:{spring:'Primavera',summer:'Verano',autumn:'Otoño',winter:'Invierno'},
  en:{spring:'Spring',summer:'Summer',autumn:'Autumn',winter:'Winter'},
  pt:{spring:'Primavera',summer:'Verão',autumn:'Outono',winter:'Inverno'},
};
const FAM_COLORS = { oriental:'#A8543A',woody:'#8B6A47',floral:'#C97A93',gourmand:'#BE8E5C',spicy:'#A8432B',citrus:'#D98E2B',fresh:'#5E9690',musky:'#A99882',fruity:'#D87856',green:'#748A60',aromatic:'#8AA07C',leather:'#6B4423',aquatic:'#5C87A0',amber:'#C9892F',powdery:'#B09478',chypre:'#7D8466',fougere:'#6F8C6E' };
const FAM_OPTIONS = ['oriental','woody','floral','gourmand','spicy','citrus','fresh','musky','fruity','green','aromatic','leather','aquatic','amber','powdery','chypre','fougere'];

// Grouped for the filter sheet: general profile + descriptive characteristics
// Olfactory profiles — derived classification, not official site data
const CHARACTERISTICS = window.CHAR_DATA || {};

function charScore(p, pk){
  const pr=CHARACTERISTICS[pk]; if(!pr) return 0;
  const fams=new Set(p.familias_oficiais||[]), notes=new Set(p.notas_colecoes||[]);
  let s=0;
  Object.entries(pr.families||{}).forEach(([f,w])=>{ if(fams.has(f)) s+=w; });
  Object.entries(pr.notes||{}).forEach(([n,w])=>{ if(notes.has(n)) s+=w; });
  Object.entries(pr.neg||{}).forEach(([f,w])=>{ if(fams.has(f)) s+=w; });
  return Math.max(0,s);
}

function charState(pk){
  if(filters.inc_chars.includes(pk)) return 'inc';
  if(filters.avoid_chars.includes(pk)) return 'avoid';
  return '';
}
function cycleChar(pk){
  const s=charState(pk);
  const ai=filters.inc_chars.indexOf(pk), av=filters.avoid_chars.indexOf(pk);
  if(s===''){filters.inc_chars.push(pk);}
  else if(s==='inc'){filters.inc_chars.splice(ai,1);filters.avoid_chars.push(pk);}
  else{filters.avoid_chars.splice(av,1);}
  updateSheet();
}

const SEASON_OPTIONS = ['spring','summer','autumn','winter'];
const PRICE_OPTIONS = [50,100,200,300];

function t(k){ return (UI_TEXT[lang]&&UI_TEXT[lang][k])||UI_TEXT.es[k]||k }
function fn(f){ return (FAM_NAMES[lang]&&FAM_NAMES[lang][f])||f }
function sn(s){ return (SEASON_NAMES[lang]&&SEASON_NAMES[lang][s])||s }
function nn(k){ 
  if(!k) return '';
  if(N[k]) return N[k][lang]||N[k].es||k;
  return k;
}
function fc(f){ return FAM_COLORS[f]||'#9C9284' }

// ── Similarity ────────────────────────────────────────────────────────────────
function sim(a,b){
  const fa=new Set(a.familias_oficiais||[]), fb=new Set(b.familias_oficiais||[]);
  const fi=[...fa].filter(x=>fb.has(x)).length, fu=new Set([...fa,...fb]).size;
  const famS = fu?fi/fu:0;
  // Note sets: official collections + pyramid note texts (raw)
  const allNotesA = new Set([...(a.notas_colecoes||[]),...pyrNoteTexts(a)]);
  const allNotesB = new Set([...(b.notas_colecoes||[]),...pyrNoteTexts(b)]);
  const ni=[...allNotesA].filter(x=>allNotesB.has(x)).length;
  const nu=new Set([...allNotesA,...allNotesB]).size;
  const noteS=nu?ni/nu:0;
  const brandB=a.marca===b.marca?0.1:0;
  return famS*0.5+noteS*0.4+brandB;
}
function pyrNoteTexts(p){
  const pyr=p.piramide||{};
  return [...(pyr.top||[]),...(pyr.heart||[]),...(pyr.base||[])].map(s=>s.toLowerCase().trim());
}
function getSims(p,n=8){
  return P.filter(x=>x.id!==p.id).map(x=>({p:x,s:sim(p,x)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,n).map(x=>x.p);
}

// ── Filtering ─────────────────────────────────────────────────────────────────
function matches(p){
  const pFam=new Set(p.familias_oficiais||[]);
  const pNotes=new Set(p.notas_colecoes||[]);
  // include families: product must have at least one
  if(filters.inc_fam.length && !filters.inc_fam.some(f=>pFam.has(f))) return false;
  // avoid families: product must have none
  if(filters.avoid_fam.some(f=>pFam.has(f))) return false;
  // include notes: product must have at least one
  if(filters.inc_notes.length && !filters.inc_notes.some(n=>pNotes.has(n))) return false;
  // avoid notes: product must have none
  if(filters.avoid_notes.some(n=>pNotes.has(n))) return false;
  // include profiles: product must match at least one (score >= 1)
  if(filters.inc_chars.length && !filters.inc_chars.some(pk=>charScore(p,pk)>=1)) return false;
  // avoid profiles: product must not strongly match any (score < threshold)
  if(filters.avoid_chars.some(pk=>{
    const pr=CHARACTERISTICS[pk]; return charScore(p,pk)>=(pr?pr.avoid_threshold:2);
  })) return false;
  // season
  if(filters.estacao!=='any' && !(p.estacoes||[]).includes(filters.estacao)) return false;
  // brand
  if(filters.marcas.length && !filters.marcas.includes(p.marca)) return false;
  // price
  if(isFinite(filters.precoMax) && parseFloat(p.preco)>filters.precoMax) return false;
  return true;
}
function pool(){
  const q=document.getElementById('search-input').value.toLowerCase().trim();
  return P.filter(p=>{
    if(!matches(p)) return false;
    if(q && !p.nome.toLowerCase().includes(q) && !p.marca.toLowerCase().includes(q)) return false;
    return true;
  });
}

// ── Render helpers ────────────────────────────────────────────────────────────
const ICO_HEART_EMPTY='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.5 4.04 3 5.5l7 7Z"/></svg>';
const ICO_HEART_FILLED='<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.5 4.04 3 5.5l7 7Z"/></svg>';
const ICO_CHECK='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
const ICO_PLUS='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
const ICO_DROP='<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#C9BBA8" stroke-width="1.2"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.5-4 6C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>';

function imgOrPh(p,cls,phCls){
  return p.imagem?`<img class="${cls}" src="${p.imagem}" alt="${p.nome}" loading="lazy">`:`<div class="${phCls}">${ICO_DROP}</div>`;
}
function famTags(p){
  return (p.familias_oficiais||[]).slice(0,3).map(f=>`<span class="tag tag-color" style="background:${fc(f)}cc">${fn(f)}</span>`).join('');
}
function pyrRows(p){
  const pyr=p.piramide||{};
  let rows='';
  if(pyr.top&&pyr.top.length) rows+=`<div class="pyr-row"><div><div class="pyr-pos" style="color:#B97A4E">${t('topNotes')}</div><div class="pyr-notes">${pyr.top.join(', ')}</div></div></div>`;
  if(pyr.heart&&pyr.heart.length) rows+=`<div class="pyr-row"><div><div class="pyr-pos" style="color:var(--accent)">${t('heartNotes')}</div><div class="pyr-notes">${pyr.heart.join(', ')}</div></div></div>`;
  if(pyr.base&&pyr.base.length) rows+=`<div class="pyr-row"><div><div class="pyr-pos" style="color:#7A5238">${t('baseNotes')}</div><div class="pyr-notes">${pyr.base.join(', ')}</div></div></div>`;
  return rows?`<div class="pyr">${rows}</div>`:'';
}
function renderCard(p,showLike){
  const isSel=selectedIds.has(p.id), isLiked=likedIds.has(p.id);
  // Family: show official text from product page when available; chips as fallback
  const famHTML=p.familia_texto
    ?`<div class="family-text"><span>${t('olfFamily')}:</span> ${p.familia_texto}</div>`
    :(p.familias_oficiais&&p.familias_oficiais.length?`<div class="tags">${famTags(p)}</div>`:'');
  const inspHTML=p.inspiracion?`<div class="inspo"><b>${t('inspiration')}: </b>${p.inspiracion}</div>`:'';
  return`<div class="card">
    <div class="card-img-wrap" onclick="openDetail(${p.id})">
      ${imgOrPh(p,'card-img','card-img-ph')}
      <div class="card-price-badge">€ ${parseFloat(p.preco).toFixed(0)}</div>
    </div>
    <div class="card-body" onclick="openDetail(${p.id})">
      <div class="card-eye">${p.marca}</div>
      <div class="card-name">${p.nome}</div>
      ${famHTML}
    </div>
    ${pyrRows(p)}
    ${inspHTML}
    <div class="card-footer">
      <button class="btn-select${isSel?' sel':''}" onclick="toggleSel(${p.id})">
        ${isSel?ICO_CHECK+' '+t('showing'):ICO_PLUS+' '+t('show')}
      </button>
      ${showLike?`<button class="btn-like${isLiked?' liked':''}" onclick="toggleLike(${p.id})">${isLiked?ICO_HEART_FILLED:ICO_HEART_EMPTY}</button>`:''}
    </div>
  </div>`;
}
function emptyHTML(icon,h,p){
  return`<div class="empty"><div class="empty-icon">${icon}</div><h3>${h}</h3><p>${p}</p></div>`;
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(t_){
  tab=t_;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t_).classList.add('active');
  document.getElementById('search-input').value='';
  renderCurrent();
}
function renderCurrent(){
  if(tab==='catalog') renderCatalog();
  else if(tab==='selection') renderSel();
  else if(tab==='liked') renderLiked();
  else renderSimilar();
  updateBadges();
  renderActiveFilters();
}
function renderCatalog(){
  const arr=pool();
  const s=document.getElementById('scroll');
  if(!arr.length){s.innerHTML=emptyHTML(ICO_DROP,t('noRes'),t('noResSub'));return;}
  s.innerHTML=`<div class="count">${arr.length} perfumes</div>`+arr.map(p=>renderCard(p,false)).join('');
}
function renderSel(){
  const arr=P.filter(p=>selectedIds.has(p.id));
  const s=document.getElementById('scroll');
  if(!arr.length){s.innerHTML=emptyHTML(ICO_CHECK,t('emptySel'),t('emptySelSub'));return;}
  s.innerHTML=`<div class="count">${arr.length} perfumes</div>`+arr.map(p=>renderCard(p,true)).join('');
}
function renderLiked(){
  const arr=P.filter(p=>likedIds.has(p.id));
  const s=document.getElementById('scroll');
  if(!arr.length){s.innerHTML=emptyHTML(ICO_HEART_EMPTY,t('emptyLiked'),t('emptyLikedSub'));return;}
  s.innerHTML=`<div class="count">${arr.length} perfumes</div>`+arr.map(p=>renderCard(p,true)).join('');
}
function renderSimilar(){
  const liked=P.filter(p=>likedIds.has(p.id));
  const s=document.getElementById('scroll');
  if(!liked.length){s.innerHTML=emptyHTML(ICO_HEART_EMPTY,t('emptySim'),t('emptySimSub'));return;}
  const scoreMap=new Map();
  liked.forEach(lp=>getSims(lp,20).forEach((sp,rank)=>{
    if(!likedIds.has(sp.id)) scoreMap.set(sp.id,(scoreMap.get(sp.id)||0)+(20-rank));
  }));
  const sorted=[...scoreMap.entries()].sort((a,b)=>b[1]-a[1]).slice(0,15).map(([id])=>P.find(p=>p.id===id)).filter(Boolean);
  if(!sorted.length){s.innerHTML=emptyHTML(ICO_DROP,t('noRes'),t('noResSub'));return;}
  s.innerHTML=`<div class="count">${t('similars')} — ${liked.map(p=>p.nome).join(', ')}</div>`+sorted.map(p=>renderCard(p,true)).join('');
}
function updateBadges(){
  const tabs=['tab-selection','tab-liked'];
  const counts=[selectedIds.size,likedIds.size];
  ['tab-selection','tab-liked'].forEach((id,i)=>{
    const el=document.getElementById(id);
    const c=i===0?selectedIds.size:likedIds.size;
    const label=i===0?t('selection'):t('liked');
    el.innerHTML=`${label}${c?`<span class="badge">${c}</span>`:''}`;
  });
  document.getElementById('tab-catalog').textContent=t('catalog');
  document.getElementById('tab-similar').textContent=t('similar');
}
function toggleSel(id){
  if(selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  renderCurrent();
}
function toggleLike(id){
  if(likedIds.has(id)) likedIds.delete(id);
  else likedIds.add(id);
  renderCurrent();
}

// ── Active filter chips ───────────────────────────────────────────────────────
function renderActiveFilters(){
  const af=document.getElementById('active-filters');
  let chips='';
  filters.inc_fam.forEach(f=>chips+=`<span class="af-chip af-inc" onclick="rmFilter('inc_fam','${f}')">${t('include')}: ${fn(f)} ${t('clear')}</span>`);
  filters.avoid_fam.forEach(f=>chips+=`<span class="af-chip af-avoid" onclick="rmFilter('avoid_fam','${f}')">${t('avoid')}: ${fn(f)} ${t('clear')}</span>`);
  filters.inc_notes.forEach(n=>chips+=`<span class="af-chip af-inc" onclick="rmFilter('inc_notes','${n}')">${t('include')}: ${nn(n)} ${t('clear')}</span>`);
  filters.avoid_notes.forEach(n=>chips+=`<span class="af-chip af-avoid" onclick="rmFilter('avoid_notes','${n}')">${t('avoid')}: ${nn(n)} ${t('clear')}</span>`);
  filters.inc_chars.forEach(pk=>{ const pr=CHARACTERISTICS[pk]; if(pr) chips+=`<span class="af-chip af-inc" onclick="rmFilter('inc_chars','${pk}')">${t('include')}: ${pr[lang]||pr.es} ${t('clear')}</span>`; });
  filters.avoid_chars.forEach(pk=>{ const pr=CHARACTERISTICS[pk]; if(pr) chips+=`<span class="af-chip af-avoid" onclick="rmFilter('avoid_chars','${pk}')">${t('avoid')}: ${pr[lang]||pr.es} ${t('clear')}</span>`; });
  af.innerHTML=chips;
  const hasF=filters.inc_fam.length||filters.avoid_fam.length||filters.inc_notes.length||filters.avoid_notes.length||filters.inc_chars.length||filters.avoid_chars.length||filters.estacao!=='any'||filters.marcas.length||isFinite(filters.precoMax);
  document.getElementById('filter-btn').classList.toggle('has-filters',!!hasF);
}
function rmFilter(field,val){
  const arr=filters[field];
  const i=arr.indexOf(val);
  if(i>=0) arr.splice(i,1);
  renderCurrent();
}

// ── Filter sheet ──────────────────────────────────────────────────────────────
const ALL_NOTES=[...new Set(P.flatMap(p=>p.notas_colecoes||[]))].filter(n=>N[n]).sort((a,b)=>(N[a]?N[a].es:a).localeCompare(N[b]?N[b].es:b));
const ALL_BRANDS=[...new Set(P.map(p=>p.marca))].sort();

function noteState(n){
  if(filters.inc_notes.includes(n)) return 'inc';
  if(filters.avoid_notes.includes(n)) return 'avoid';
  return '';
}
function famState(f){
  if(filters.inc_fam.includes(f)) return 'inc';
  if(filters.avoid_fam.includes(f)) return 'avoid';
  return '';
}
function cycleNote(n){
  // cycle: none → include → avoid → none
  const s=noteState(n);
  const ai=filters.inc_notes.indexOf(n), av=filters.avoid_notes.indexOf(n);
  if(s===''){filters.inc_notes.push(n);}
  else if(s==='inc'){filters.inc_notes.splice(ai,1);filters.avoid_notes.push(n);}
  else{filters.avoid_notes.splice(av,1);}
  updateSheet();
}
function cycleFam(f){
  const s=famState(f);
  const ai=filters.inc_fam.indexOf(f), av=filters.avoid_fam.indexOf(f);
  if(s===''){filters.inc_fam.push(f);}
  else if(s==='inc'){filters.inc_fam.splice(ai,1);filters.avoid_fam.push(f);}
  else{filters.avoid_fam.splice(av,1);}
  updateSheet();
}
function updateSheet(){
  const body=document.getElementById('sheet-body');
  const cnt=P.filter(matches).length;
  document.getElementById('sheet-count').textContent=cnt+' perfumes';

  const hint = `<small style="display:block;font-size:11px;color:var(--text3);margin-bottom:10px">Toca 1× para incluir (verde), 2× para evitar (rojo), 3× para quitar</small>`;

  body.innerHTML=`
    <div class="sheet-sect">
      <div class="sheet-sect-label" style="margin-bottom:6px">${lang==='pt'?'Família Olfativa':lang==='en'?'Olfactory Family':'Familia Olfativa'}</div>
      ${hint}
      <div class="fam-chips">${FAM_OPTIONS.map(f=>{
        const s=famState(f);
        return`<button class="fam-chip ${s}" onclick="cycleFam('${f}')" style="${s==='inc'?'border-color:var(--accent2);background:var(--accent2);color:#fff':s==='avoid'?'border-color:var(--accent-avoid);background:var(--accent-avoid);color:#fff':''}">${fn(f)}</button>`;
      }).join('')}</div>
    </div>
    <div class="sheet-sect">
      <div class="sheet-sect-label" style="margin-bottom:4px">${lang==='pt'?'Características':lang==='en'?'Characteristics':'Características'}</div>
      <small style="display:block;font-size:11px;color:var(--text3);margin-bottom:6px">${lang==='pt'?'Classificação sugerida — não é informação oficial da marca.':lang==='en'?'Suggested classification — not official brand information.':'Clasificación sugerida — no es información oficial de la marca.'}</small>
      ${hint}
      <div class="note-list">${Object.entries(CHARACTERISTICS).map(([pk,pr])=>{
        const s=charState(pk);
        const lbl=pr[lang]||pr.es;
        const desc=pr['desc_'+lang]||pr.desc_es;
        return`<div class="note-item" onclick="cycleChar('${pk}')" title="${desc}">
          <span class="note-item-label">${lbl}<br><small style="font-size:11px;color:var(--text3)">${desc}</small></span>
          <span class="note-item-state ${s}">${s==='inc'?'✓':s==='avoid'?'✕':''}</span>
        </div>`;
      }).join('')}</div>
    </div>
    <div class="sheet-sect">
      <div class="sheet-sect-label" style="margin-bottom:6px">${t('notes')}</div>
      ${hint}
      <div class="note-list">${ALL_NOTES.map(n=>{
        const s=noteState(n);
        return`<div class="note-item" onclick="cycleNote('${n}')">
          <span class="note-item-label">${nn(n)}</span>
          <span class="note-item-state ${s}">${s==='inc'?'✓':s==='avoid'?'✕':''}</span>
        </div>`;
      }).join('')}</div>
    </div>
    <div class="sheet-sect">
      <div class="sheet-sect-label">${t('season')}</div>
      <div class="option-row">
        <button class="option-btn${filters.estacao==='any'?' active':''}" onclick="setF('estacao','any')">${t('allSeasons')}</button>
        ${SEASON_OPTIONS.map(s=>`<button class="option-btn${filters.estacao===s?' active':''}" onclick="setF('estacao','${s}')">${sn(s)}</button>`).join('')}
      </div>
    </div>
    <div class="sheet-sect">
      <div class="sheet-sect-label">${t('price')}</div>
      <div class="option-row">
        <button class="option-btn${!isFinite(filters.precoMax)?' active':''}" onclick="setF('precoMax',Infinity)">${t('any')}</button>
        ${PRICE_OPTIONS.map(v=>`<button class="option-btn${filters.precoMax===v?' active':''}" onclick="setF('precoMax',${v})">${t('upTo')} €${v}</button>`).join('')}
      </div>
    </div>
    <div class="sheet-sect">
      <div class="sheet-sect-label">${t('brand')} (${filters.marcas.length||t('allBrands')})</div>
      <div class="note-list">${ALL_BRANDS.map(b=>{
        const sel=filters.marcas.includes(b);
        return`<div class="note-item" onclick="toggleBrand('${b.replace(/'/g,"\\'")}')">
          <span class="note-item-label">${b}</span>
          <span class="note-item-state${sel?' inc':''}">${sel?'✓':''}</span>
        </div>`;
      }).join('')}</div>
    </div>`;
}
function setF(k,v){ filters[k]=v; updateSheet(); }
function toggleBrand(b){
  const i=filters.marcas.indexOf(b);
  if(i>=0) filters.marcas.splice(i,1); else filters.marcas.push(b);
  updateSheet();
}
function openSheet(){ document.getElementById('overlay').classList.add('open'); updateSheet(); }
function closeSheet(){ document.getElementById('overlay').classList.remove('open'); }
function closeOutside(e){ if(e.target===document.getElementById('overlay')) closeSheet(); }
function applyFilters(){ closeSheet(); renderCurrent(); }

// ── Detail ────────────────────────────────────────────────────────────────────
function openDetail(id){
  const p=P.find(x=>x.id===id);
  if(!p) return;
  const isSel=selectedIds.has(id), isLiked=likedIds.has(id);
  const pyr=p.piramide||{};
  let pyrHTML='';
  const mkRow=(notes,label,color,dotColor)=>notes&&notes.length?`<div class="detail-pyr-row"><div class="detail-pyr-dot" style="background:${dotColor}"></div><div><div class="detail-pyr-pos" style="color:${color}">${label}</div><div class="detail-pyr-notes">${notes.join(', ')}</div></div></div>`:'';
  const pRows=mkRow(pyr.top,t('topNotes'),'#B97A4E','#B97A4E')+mkRow(pyr.heart,t('heartNotes'),'var(--accent)','var(--accent)')+mkRow(pyr.base,t('baseNotes'),'#7A5238','#7A5238');
  if(pRows) pyrHTML=`<div class="detail-sect"><div class="detail-sect-label">¿A qué huele ${p.nome}?</div><div class="detail-pyr">${pRows}</div></div>`;

  const metaItems=[];
  if(p.concentracion) metaItems.push(`<div class="meta-item"><div class="meta-label">${t('concentration')}</div><div class="meta-value">${p.concentracion}</div></div>`);
  if(p.duracao_pct!=null) metaItems.push(`<div class="meta-item"><div class="meta-label">${t('duration')}</div><div class="meta-value">${p.duracao_pct}%</div></div>`);
  if(p.proyeccion_pct!=null&&p.proyeccion_pct!==p.duracao_pct) metaItems.push(`<div class="meta-item"><div class="meta-label">${t('projection')}</div><div class="meta-value">${p.proyeccion_pct}%</div></div>`);

  const sims=getSims(p,6);
  const simsHTML=sims.map(s=>`<div class="sim-card" onclick="openDetail(${s.id})">
    ${s.imagem?`<img class="sim-img" src="${s.imagem}" alt="${s.nome}" loading="lazy">`:`<div class="sim-img-ph">${ICO_DROP}</div>`}
    <div class="sim-info"><div class="sim-brand">${s.marca}</div><div class="sim-name">${s.nome}</div><div class="sim-fam">${(s.familias_oficiais||[]).slice(0,2).map(fn).join(' · ')}</div></div>
    <div class="sim-price">€${parseFloat(s.preco).toFixed(0)}</div>
  </div>`).join('');

  document.getElementById('detail-back-txt').textContent=t('back');
  document.getElementById('detail-body').innerHTML=`
    ${p.imagem?`<img class="detail-img" src="${p.imagem}" alt="${p.nome}">`:`<div class="detail-img-ph">${ICO_DROP}</div>`}
    <div class="detail-eye">${p.marca}</div>
    <div class="detail-name">${p.nome}</div>
    <div class="detail-price">€ ${parseFloat(p.preco).toFixed(0)}</div>
    ${p.familia_texto
      ?`<div class="family-text" style="margin-bottom:16px"><span>${t('olfFamily')}:</span> ${p.familia_texto}</div>`
      :(p.familias_oficiais&&p.familias_oficiais.length?`<div class="tags" style="margin-bottom:16px">${famTags(p)}</div>`:'')
    }
    <div class="detail-actions">
      <button class="detail-select${isSel?' sel':''}" onclick="toggleSel(${id});this.className='detail-select'+(selectedIds.has(${id})?' sel':'');this.innerHTML=(selectedIds.has(${id})?'${ICO_CHECK} '+t('showing'):'${ICO_PLUS} '+t('show'))">${isSel?ICO_CHECK+' '+t('showing'):ICO_PLUS+' '+t('show')}</button>
      <button class="detail-like${isLiked?' liked':''}" id="dl-${id}" onclick="toggleLike(${id});document.getElementById('dl-${id}').className='detail-like'+(likedIds.has(${id})?' liked':'');document.getElementById('dl-${id}').innerHTML=(likedIds.has(${id})?'${ICO_HEART_FILLED}':'${ICO_HEART_EMPTY}')">${isLiked?ICO_HEART_FILLED:ICO_HEART_EMPTY}</button>
    </div>
    ${pyrHTML}
    ${p.inspiracion?`<div class="detail-sect"><div class="detail-sect-label">${t('inspiration')}</div><div class="detail-inspo">${p.inspiracion}</div></div>`:''}
    ${metaItems.length?`<div class="detail-sect"><div class="detail-meta">${metaItems.join('')}</div></div>`:''}
    ${sims.length?`<div class="detail-sect"><div class="detail-sect-label">${t('similars')}</div>${simsHTML}</div>`:''}
  `;
  document.getElementById('detail').classList.add('open');
  document.getElementById('detail').scrollTop=0;
}
function closeDetail(){ document.getElementById('detail').classList.remove('open'); renderCurrent(); }

// ── Language ──────────────────────────────────────────────────────────────────
function setLang(l){
  lang=l;
  document.getElementById('app-title').textContent=t('appTitle');
  document.getElementById('search-input').placeholder=t('search');
  document.getElementById('filter-label').textContent=t('filter');
  document.getElementById('sheet-apply').textContent=t('apply');
  document.getElementById('lang-pill').innerHTML=['es','en','pt'].map(c=>`<button class="lang-btn${lang===c?' active':''}" onclick="setLang('${c}')">${c.toUpperCase()}</button>`).join('');
  renderCurrent();
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.getElementById('lang-pill').innerHTML=['es','en','pt'].map(c=>`<button class="lang-btn${lang===c?' active':''}" onclick="setLang('${c}')">${c.toUpperCase()}</button>`).join('');
updateBadges();
renderCatalog();
</script>
